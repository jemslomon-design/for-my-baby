<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Note For You</title>
    <style>
        /* Modern Design Overhaul */
        body {
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Subtle floating effect on hover */
        .card:hover {
            transform: translateY(-10px);
        }

        /* The Heart Pulse */
        .heart {
            color: #e91e63;
            font-size: 40px;
            animation: pulse 1.5s infinite;
            margin-bottom: 10px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .photo-stack {
            position: relative;
            height: 220px;
            margin: 20px 0;
        }

        .photo {
            width: 180px;
            background: #fff;
            padding: 10px 10px 25px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: absolute;
            left: 50%;
            margin-left: -90px;
            transition: 0.5s;
        }

        /* Stacked Photo Look */
        .photo.one {
            transform: rotate(-6deg);
            z-index: 1;
        }
        .photo.two {
            transform: rotate(6deg);
            z-index: 2;
        }

        /* When you hover over the stack, they fan out */
        .photo-stack:hover .photo.one { transform: rotate(-15deg) translateX(-40px); }
        .photo-stack:hover .photo.two { transform: rotate(15deg) translateX(40px); }

        .photo img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 2px;
        }

        h2 {
            color: #d81b60;
            font-family: 'Georgia', serif;
            margin: 15px 0;
        }

        p {
            color: #555;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤</div>
        
        <h2>For My Dearest</h2>

        <div class="photo-stack">
            <div class="photo one">
                <img src="photo1.jpg" alt="Memory 1">
            </div>
            <div class="photo two">
                <img src="photo2.jpg" alt="Memory 2">
            </div>
        </div>

        <p>
            Every day with you is a new adventure. 
            Hover over our photos to see how much I cherish us!
        </p>

        <div class="footer">
            Made with love by [Your Name]
        </div>
    </div>

</body>
</html>
