<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Note For You</title>
    <style>
        /* --- GLOBAL STYLES --- */
        :root {
            --primary-pink: #db2777;
            --soft-pink: #f472b6;
            --bg-gradient: linear-gradient(135deg, #fdf2f8 0%, #fff7ed 50%, #fef2f2 100%);
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* --- FLOATING PETALS --- */
        .floating {
            position: absolute;
            pointer-events: none;
            z-index: -1;
            animation: floatUp 8s linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            15% { opacity: 0.7; }
            85% { opacity: 0.7; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* --- DECORATIONS --- */
        .flower {
            position: absolute;
            font-size: 38px;
            z-index: 10;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }
        .sunflower { color: #fbbf24; } 
        .lily { color: #f472b6; } 

        .f-top-left { top: -20px; left: -20px; transform: rotate(-15deg); }
        .f-bottom-right { bottom: -20px; right: -20px; transform: rotate(15deg); }

        .heart-main {
            color: var(--primary-pink);
            font-size: 50px;
            animation: pulse 2s infinite ease-in-out;
            margin-bottom: 10px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(219,39,119,0)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 10px rgba(219,39,119,0.3)); }
        }

        /* --- POLAROID DESIGN --- */
        .photo, .side-photo {
            background: #ffffff; 
            padding: 12px 12px 40px 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.07);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid #fce7f3;
            position: relative;
            width: 155px; 
            margin: 10px auto;
        }

        .photo::after, .side-photo::after {
            content: '';
            position: absolute;
            top: -12px;
            left: 25%;
            width: 50%;
            height: 24px;
            background: rgba(244, 114, 182, 0.2);
            backdrop-filter: blur(2px);
            transform: rotate(-2deg);
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            border-left: 1px dashed rgba(255,255,255,0.4);
            border-right: 1px dashed rgba(255,255,255,0.4);
        }

        .photo img, .side-photo img {
            width: 100%;
            height: 145px;
            object-fit: cover;
            object-position: top;
            border-radius: 1px;
            display: block;
        }

        .photo:hover, .side-photo:hover {
            transform: scale(1.08) rotate(0deg) translateY(-10px) !important;
            box-shadow: 0 25px 50px rgba(219,39,119,0.15);
            z-index: 100;
        }

        /* --- PAGE 1: CARD --- */
        .card {
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
            max-width: 380px;
            padding: 50px 35px;
            border-radius: 50px;
            box-shadow: 0 30px 70px rgba(219, 39, 119, 0.1);
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .photo-stack {
            position: relative;
            height: 280px;
            margin: 25px 0;
        }

        .photo { position: absolute; left: 50%; margin-left: -77px; }
        .photo.one { transform: rotate(-8deg); z-index: 1; }
        .photo.two { transform: rotate(10deg); z-index: 2; }

        /* --- PAGE 2: LETTER --- */
        .letter-page { display: none; opacity: 0; transition: opacity 0.8s ease; width: 100%; }
        
        .letter-wrapper { 
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: start;
            justify-content: center;
            gap: 40px;
            max-width: 1150px;
            margin: 20px auto;
            padding: 20px;
        }

        .photo-column {
            display: flex;
            flex-direction: column;
            gap: 30px;
            min-width: 180px;
        }

        .letter-main { 
            background: #ffffff;
            padding: 55px;
            border-radius: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.03);
            position: relative;
            z-index: 5;
            box-sizing: border-box;
            border: 1px solid #fff5f7;
        }

        .letter-text {
            text-align: left;
            font-family: 'Georgia', serif;
            font-style: italic;
            white-space: pre-wrap;
            color: #3e2723;
            margin-top: 30px;
            line-height: 2;
            font-size: 1.1rem;
            min-height: 200px;
        }

        /* --- BUTTONS --- */
        .btn {
            background: linear-gradient(135deg, #db2777, #ec4899);
            color: white;
            border: none;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .btn:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 15px 30px rgba(219, 39, 119, 0.4);
            filter: brightness(1.1);
        }

        .btn-back { background: transparent; border: 1.5px solid #f472b6; color: #f472b6; margin-top: 30px; box-shadow: none; }

        /* --- IMAGE VIEWER --- */
        .image-viewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 7, 0.98); justify-content: center; align-items: center;
            z-index: 9999; cursor: zoom-out;
        }
        .image-viewer img { max-width: 90%; max-height: 85%; border: 10px solid white; border-radius: 4px; }
        .image-viewer.show { display: flex; }

        /* --- MOBILE --- */
        @media (max-width: 850px) {
            .letter-wrapper { grid-template-columns: 1fr; grid-template-areas: "letter" "photos"; gap: 30px; }
            .letter-main { grid-area: letter; padding: 40px 25px; }
            .photo-column { grid-area: photos; flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .side-photo { width: 44%; transform: rotate(0deg) !important; }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <span class="flower sunflower f-top-left">🌻</span>
        <span class="flower lily f-bottom-right">🌸</span>
        <div class="heart-main">❤</div>
        <h2 style="color: #be185d; font-family: 'Brush Script MT', cursive; font-size: 2.8rem; margin: 10px 0;">For My Pretty Baby</h2>

        <div class="photo-stack">
            <div class="photo one" onclick="zoomImage(this)">
                <img src="https://res.cloudinary.com/ddwbo9ebb/image/upload/f_auto,q_auto/PIC1_c2kw2r">
            </div>
            <div class="photo two" onclick="zoomImage(this)">
                <img src="https://res.cloudinary.com/ddwbo9ebb/image/upload/f_auto,q_auto/BABY_gi7iyf">
            </div>
        </div>

        <button class="btn" onclick="openLetter()">Open My Letter</button>
        <p style="margin-top: 25px; font-size: 0.95rem; color: #db2777; font-weight: 600; font-style: italic;">
            To the prettiest girl in my world ✨
        </p>
    </div>

    <div class="letter-page" id="letterPage">
        <div class="letter-wrapper">
            
            <div class="photo-column">
                <div class="side-photo" onclick="zoomImage(this)"><img src="https://res.cloudinary.com/ddwbo9ebb/image/upload/f_auto,q_auto/PIC1_c2kw2r"></div>
                <div class="side-photo" onclick="zoomImage(this)"><img src="https://res.cloudinary.com/ddwbo9ebb/image/upload/f_auto,q_auto/PIC2_s40zyz"></div>
                <div class="side-photo" onclick="zoomImage(this)"><img src="https://res.cloudinary.com/ddwbo9ebb/image/upload/f_auto,q_auto/PIC3_d3ejww"></div>
            </div>

            <div class="letter-main">
                <span class="flower sunflower f-top-left">🌻</span>
                <span class="flower lily f-bottom-right">🌸</span>
                <div class="heart-main" style="font-size: 35px;">❤</div>
                <h2 style="color: #be185d; margin: 0; font-family: 'Brush Script MT', cursive; font-size: 2.2rem;">My Baby!,</h2>
                
                <div class="letter-text" id="typewriterText"></div>
                
                <button class="btn btn-back" onclick="showCard()">Go Back</button>
            </div>

            <div class="photo-column">
                <div class="side-photo" onclick="zoomImage(this)"><img src="https://res.cloudinary.com/ddwbo9ebb/image/upload/f_auto,q_auto/PIC4_rh8hih"></div>
                <div class="side-photo" onclick="zoomImage(this)"><img src="https://res.cloudinary.com/ddwbo9ebb/image/upload/f_auto,q_auto/PIC5_r0hysx"></div>
                <div class="side-photo" onclick="zoomImage(this)"><img src="https://res.cloudinary.com/ddwbo9ebb/image/upload/f_auto,q_auto/PIC6_bcbkxk"></div>
            </div>

        </div>
    </div>

    <div class="image-viewer" id="imageViewer" onclick="closeViewer()">
        <img id="viewerImage" src="">
    </div>

    <script>
        const message = "HAPPY 20TH BIRTHDAY MY BABYY! sobrang blessed ko na kasama kita hanggang ngayon, 'di ko masabi sa salita kung gaano ako ka grateful na nakilala kita.\n\nThank you baby kasi hindi ka nagsasawa sa'kin, sobrang proud ako sa'yo baby kasi kahit na may mga bagay kang hindi nasasabi or yung mga bagay na nahihirapan ka lumalaban ka pa rin. Proud ako sa mga na-achieve mo ngayon; kahit na hindi nakikita ng iba, ako nakikita ko lahat ng struggles mo.\n\nAlam ko hindi naging madali mga pinagdaanan natin pero andito pa rin tayo. Natutuwa ako kasi biniyayaan ako ng panginoon ng babae na isang katulad mo na napakabait, matalino at matapang. Goodluck sa studies mo and lagi mong tatandaan na kahit ano man mangyari ako ang kakampi mo at hinding hindi kita iiwan. Again happy happy birthday to you my baby and enjoy your day! I LOVE YOU MY BABYYYY MWA MWA MWA MWA MWA MWAAAAA\n\nAlways yours,\nMelvin";

        function createFloatingElements() {
            const items = ['❤', '🌸', '🌻'];
            for(let i=0; i<25; i++) {
                let el = document.createElement('div');
                el.className = 'floating';
                el.innerHTML = items[Math.floor(Math.random() * items.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDelay = Math.random() * 8 + 's';
                el.style.fontSize = (Math.random() * 20 + 15) + 'px';
                el.style.color = el.innerHTML === '🌻' ? '#fbbf24' : (el.innerHTML === '🌸' ? '#f472b6' : '#f9a8d4');
                document.body.appendChild(el);
            }
        }

        function typeWriter(text, elementId, speed) {
            let i = 0;
            const elem = document.getElementById(elementId);
            elem.innerHTML = "";
            function type() {
                if (i < text.length) {
                    elem.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function openLetter() {
            document.getElementById('mainCard').style.display = 'none';
            const letter = document.getElementById('letterPage');
            letter.style.display = 'block';
            setTimeout(() => { 
                letter.style.opacity = '1'; 
                typeWriter(message, "typewriterText", 40);
            }, 50);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showCard() {
            document.getElementById('letterPage').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('letterPage').style.display = 'none';
                document.getElementById('mainCard').style.display = 'block';
                document.getElementById('typewriterText').innerHTML = ""; 
            }, 600);
        }

        function zoomImage(element) {
            const viewer = document.getElementById('imageViewer');
            document.getElementById('viewerImage').src = element.querySelector('img').src;
            viewer.classList.add('show');
        }

        function closeViewer() {
            document.getElementById('imageViewer').classList.remove('show');
        }

        createFloatingElements();
    </script>
</body>
</html>
